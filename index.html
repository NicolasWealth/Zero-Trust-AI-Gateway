<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Trust AI Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body class="bg-[#070b14]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function Header() {
          const [time, setTime] = useState(new Date());
          useEffect(() => {
            const timer = setInterval(() => setTime(new Date()), 1000);
            return () => clearInterval(timer);
          }, []);
          return (
            <header className="w-full border-b border-cyan-500/20 bg-[#080c14]/90 backdrop-blur-md sticky top-0 z-50">
              <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <div className="w-10 h-10 flex items-center justify-center rounded-lg border border-cyan-500/30 bg-cyan-500/5 overflow-hidden">
                    <img src="https://public.readdy.ai/ai/img_res/158da580-120c-48fc-ad02-93b52ead31d4.png" alt="Logo" className="w-8 h-8 object-contain" />
                  </div>
                  <div>
                    <h1 className="text-white font-bold text-lg tracking-widest font-mono leading-none">
                      ZERO<span className="text-cyan-400">-TRUST</span>
                    </h1>
                    <p className="text-[10px] tracking-[0.3em] text-cyan-500/70 uppercase mt-0.5">AI Gateway v2.6.1</p>
                  </div>
                </div>
                <div className="hidden md:flex items-center gap-6">
                  <div className="flex items-center gap-2 px-3 py-1.5 rounded-full border text-xs font-mono text-cyan-400 border-cyan-500/30 bg-cyan-500/10">
                    <span className="w-1.5 h-1.5 rounded-full animate-pulse bg-cyan-400" />
                    <i className="ri-shield-check-line text-xs" />
                    <span className="tracking-wide">Zero-Trust Active</span>
                  </div>
                  <div className="flex items-center gap-2 px-3 py-1.5 rounded-full border text-xs font-mono text-emerald-400 border-emerald-500/30 bg-emerald-500/10">
                    <span className="w-1.5 h-1.5 rounded-full animate-pulse bg-emerald-400" />
                    <i className="ri-brain-line text-xs" />
                    <span className="tracking-wide">AI Engine Online</span>
                  </div>
                  <div className="flex items-center gap-2 px-3 py-1.5 rounded-full border text-xs font-mono text-amber-400 border-amber-500/30 bg-amber-500/10">
                    <span className="w-1.5 h-1.5 rounded-full animate-pulse bg-amber-400" />
                    <i className="ri-radar-line text-xs" />
                    <span className="tracking-wide">Threat Monitor</span>
                  </div>
                </div>
                <div className="text-right font-mono">
                  <p className="text-cyan-400 text-sm font-semibold">
                    {time.toLocaleTimeString("en-US", { hour12: false })}
                  </p>
                  <p className="text-slate-500 text-xs">
                    {time.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "2-digit" })}
                  </p>
                </div>
              </div>
              <div className="h-px w-full bg-gradient-to-r from-transparent via-cyan-500/60 to-transparent animate-pulse" />
            </header>
          );
        }

        function StatCard({ icon, label, value, color }) {
          const colorMap = {
            cyan:  "border-cyan-900/40 bg-cyan-950/20 text-cyan-300 [&_i]:text-cyan-400",
            red:   "border-red-900/40 bg-red-950/20 text-red-300 [&_i]:text-red-400",
            amber: "border-amber-900/40 bg-amber-950/20 text-amber-300 [&_i]:text-amber-400",
            green: "border-emerald-900/40 bg-emerald-950/20 text-emerald-300 [&_i]:text-emerald-400",
          };
          return (
            <div className={`rounded-xl border px-4 py-3 ${colorMap[color]}`}>
              <div className="flex items-center gap-2 mb-1">
                <i className={`${icon} text-sm`} />
                <span className="text-xs font-mono text-slate-500 truncate">{label}</span>
              </div>
              <p className="text-xl font-bold font-mono">{value}</p>
            </div>
          );
        }

        function InputPrompt({ value, onChange, onSubmit, isProcessing }) {
          const [isFocused, setIsFocused] = useState(false);
          const maxChars = 2000;
          return (
            <section className="w-full">
              <div className="flex items-center gap-3 mb-4">
                <div className="w-6 h-6 flex items-center justify-center rounded border border-cyan-500/40 bg-cyan-500/10">
                  <i className="ri-edit-2-line text-cyan-400 text-xs" />
                </div>
                <span className="text-xs font-mono tracking-[0.25em] text-cyan-400/80 uppercase">Input Prompt</span>
                <div className="flex-1 h-px bg-gradient-to-r from-cyan-500/30 to-transparent" />
                <span className="text-xs font-mono text-slate-500">{value.length} / {maxChars}</span>
              </div>
              <div className={`relative rounded-xl border transition-all duration-300 bg-[#0b1120] ${isFocused ? "border-cyan-500/60 shadow-[0_0_20px_rgba(0,212,255,0.2)]" : "border-slate-800"}`}>
                <textarea
                  value={value}
                  onChange={(e) => onChange(e.target.value.substring(0, maxChars))}
                  onFocus={() => setIsFocused(true)}
                  onBlur={() => setIsFocused(false)}
                  placeholder="Enter the payload to be analyzed..."
                  disabled={isProcessing}
                  className="w-full h-32 px-5 py-4 bg-transparent outline-none resize-none font-mono text-sm leading-relaxed placeholder:text-slate-700 disabled:opacity-50 text-slate-300"
                />
                <div className="flex justify-between items-center px-4 py-3 border-t border-slate-800/60 bg-[#070b14]/50 rounded-b-xl">
                    <span className="text-[10px] text-slate-600 font-mono flex items-center gap-2">
                        <i className="ri-information-line"></i>
                        AUTO-REDACTION ENABLED
                    </span>
                    <button
                        onClick={onSubmit}
                        disabled={isProcessing || !value.trim()}
                        className="px-5 py-2 rounded-lg bg-cyan-500/20 hover:bg-cyan-500/30 border border-cyan-500/50 text-cyan-300 font-mono text-xs tracking-widest transition-all shadow-[0_0_15px_rgba(0,212,255,0.15)] disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
                    >
                        {isProcessing ? (
                            <><i className="ri-loader-4-line animate-spin"></i> SECURING...</>
                        ) : (
                            <><i className="ri-send-plane-fill"></i> SECURE & SEND</>
                        )}
                    </button>
                </div>
              </div>
            </section>
          );
        }

        function RedactedOutput({ content, redactedCount, isVisible, isAnimating }) {
            if (!isVisible) return null;
            return (
                <div className={`p-5 rounded-xl border border-rose-500/30 bg-rose-950/10 transition-all duration-500`}>
                    <div className="flex items-center justify-between mb-4 text-rose-400 font-mono text-xs uppercase tracking-widest border-b border-rose-500/20 pb-2">
                        <div className="flex items-center gap-2">
                            <i className="ri-shield-keyhole-line text-lg"></i>
                            <span>Sanitized Payload</span>
                        </div>
                        <div className="flex items-center gap-1.5 border border-rose-500/40 bg-rose-500/10 px-2 py-0.5 rounded text-[10px]">
                          <i className="ri-error-warning-line"></i>
                          {redactedCount} SECRETS BLOCKED
                        </div>
                    </div>
                    <p className="font-mono text-sm text-slate-300 leading-relaxed whitespace-pre-wrap">{content}</p>
                </div>
            );
        }

        function AIResponse({ content, isVisible, isAnimating, processingTime }) {
            if (!isVisible) return null;
            return (
                <div className={`p-5 rounded-xl border border-emerald-500/30 bg-emerald-950/10 transition-all duration-500`}>
                    <div className="flex items-center justify-between mb-4 text-emerald-400 font-mono text-xs uppercase tracking-widest border-b border-emerald-500/20 pb-2">
                        <div className="flex items-center gap-2">
                            <i className="ri-brain-line text-lg"></i>
                            <span>AI Engine Output</span>
                        </div>
                        <span className="text-[10px] text-emerald-500/70">Latency: {processingTime > 0 ? processingTime.toFixed(2) : "..."}s</span>
                    </div>
                    <p className="font-sans text-[15px] text-slate-200 leading-relaxed whitespace-pre-wrap">{content}</p>
                </div>
            );
        }

        function Footer() {
            return (
                <footer className="mt-auto py-8 w-full flex items-center justify-center font-mono text-[10px] text-slate-600 tracking-[0.2em] border-t border-slate-800/50">
                    <div className="flex items-center gap-2">
                        <i className="ri-lock-fill text-slate-500"></i>
                        POWERED BY ZERO-TRUST ENGINE
                    </div>
                </footer>
            );
        }

        function App() {
          const [prompt, setPrompt] = useState("");
          const [isProcessing, setIsProcessing] = useState(false);
          const [isAnimating, setIsAnimating] = useState(false);
          const [result, setResult] = useState(null);
          const [showResults, setShowResults] = useState(false);
          const [processingTime, setProcessingTime] = useState(0);
          const [requestCount, setRequestCount] = useState(0);

          const handleSubmit = async () => {
            if (!prompt.trim() || isProcessing) return;
            
            setIsProcessing(true);
            setIsAnimating(true);
            setShowResults(true);
            setResult(null); // Reset the screen
            const startTime = Date.now();

            try {
                // 1. Send the data to YOUR server endpoint
                const response = await fetch('/ask-ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();

                // 2. Map the Gateway response to the Readdy UI
                // We count the [REDACTED] tags to show in the stats
                const redactionCount = (data.redacted_version.match(/\[REDACTED/g) || []).length;

                setResult({
                    redacted: data.redacted_version,
                    redactedCount: redactionCount,
                    aiResponse: data.ai_answer
                });

                setProcessingTime((Date.now() - startTime) / 1000);
                setRequestCount((c) => c + 1);

            } catch (error) {
                console.error("Gateway Error:", error);
                alert("The Security Gateway is offline. Check your terminal!");
            } finally {
                setIsAnimating(false);
                setIsProcessing(false);
            }
          };

          return (
            <div className="min-h-screen flex flex-col bg-[#070b14] text-slate-200 relative overflow-x-hidden">
              <div
                className="fixed inset-0 pointer-events-none opacity-[0.035]"
                style={{
                  backgroundImage:
                    "linear-gradient(rgba(0,212,255,0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.5) 1px, transparent 1px)",
                  backgroundSize: "40px 40px",
                }}
              />
              <div className="fixed top-0 left-1/4 w-96 h-96 bg-cyan-500/5 rounded-full blur-3xl pointer-events-none" />
              <div className="fixed bottom-1/4 right-1/4 w-80 h-80 bg-emerald-500/4 rounded-full blur-3xl pointer-events-none" />
              
              <Header />
              
              <main className="flex-1 w-full max-w-4xl mx-auto px-6 py-10 flex flex-col gap-10 z-10">
                <div className="text-center mb-2">
                  <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-cyan-500/20 bg-cyan-500/5 text-xs font-mono text-cyan-400/70 tracking-widest mb-5">
                    <i className="ri-shield-flash-line animate-pulse" />
                    ZERO-TRUST ARCHITECTURE · ACTIVE
                  </div>
                  <h2 className="text-3xl md:text-4xl font-bold text-white tracking-tight leading-tight">
                    AI Gateway{" "}
                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-400">
                      Security Console
                    </span>
                  </h2>
                  <p className="mt-3 text-sm text-slate-400 max-w-lg mx-auto leading-relaxed">
                    All prompts are automatically scanned, PII is redacted, and traffic is encrypted before reaching the AI engine.
                  </p>
                </div>
                
                <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                  <StatCard icon="ri-shield-check-line" label="Requests Secured" value={`${1024 + requestCount}`} color="cyan" />
                  <StatCard icon="ri-eye-off-line" label="Items Redacted" value={`${result?.redactedCount ?? 0}`} color="red" />
                  <StatCard icon="ri-cpu-line" label="Avg Latency" value={`${processingTime > 0 ? processingTime.toFixed(2) : "—"}s`} color="amber" />
                  <StatCard icon="ri-lock-2-line" label="Threat Level" value="LOW" color="green" />
                </div>
                
                <InputPrompt value={prompt} onChange={setPrompt} onSubmit={handleSubmit} isProcessing={isProcessing} />
                
                {showResults && (
                  <div className="flex flex-col gap-8 animate-fade-in">
                    <RedactedOutput content={result?.redacted ?? ""} redactedCount={result?.redactedCount ?? 0} isVisible={showResults} isAnimating={isAnimating} />
                    <AIResponse content={result?.aiResponse ?? ""} isVisible={showResults} isAnimating={isAnimating} processingTime={processingTime} />
                  </div>
                )}
                
                {!showResults && (
                  <div className="flex flex-col items-center gap-4 py-8 opacity-40">
                    <div className="w-16 h-16 flex items-center justify-center rounded-2xl border border-slate-700/60 bg-slate-800/20">
                      <i className="ri-secure-payment-line text-3xl text-slate-500" />
                    </div>
                    <p className="text-xs font-mono text-slate-500 tracking-wider text-center max-w-xs uppercase">
                      Enter a prompt above and click SECURE &amp; SEND to see the redacted output and AI response
                    </p>
                  </div>
                )}
              </main>
              
              <Footer />
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</body>
</html>
